<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate God's Word</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #d4af37;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            background-image: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 30px 15px 10px 15px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            z-index: 50;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: rotate(30deg);
        }

        h1 {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: clamp(26px, 6vw, 36px);
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .stats-container {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .stats {
            display: inline-flex;
            justify-content: center;
            gap: clamp(15px, 4vw, 40px);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .stats span {
            color: var(--accent);
            font-size: 18px;
            transition: color 0.3s;
        }

        .stats.score-highlight {
            border-color: #34d399;
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }

        .stats.score-highlight span {
            color: #34d399;
        }

        .redemption-badge {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.4);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #fbbf24;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: pulseBadge 2s infinite;
        }
        .redemption-badge.show {
            display: inline-flex;
        }

        @keyframes pulseBadge {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(251,191,36,0.2); }
            50% { transform: scale(1.03); box-shadow: 0 0 18px rgba(251,191,36,0.4); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(251,191,36,0.2); }
        }

        .floating-score {
            position: absolute;
            right: 15px;
            top: 0;
            color: #34d399;
            font-weight: 700;
            font-size: 16px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(0);
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-25px) scale(1.2); }
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
            box-sizing: border-box;
            margin-top: 15px;
        }

        .game-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 550px;
        }

        .game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            cursor: crosshair;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .center-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 61%; 
            height: 61%; 
            perspective: 1000px;
            z-index: 10;
            pointer-events: none; 
        }

        .center-ui-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 50%;
        }

        .center-ui-inner.flipped {
            transform: rotateY(180deg);
        }

        .center-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(15,23,42,0.95) 0%, rgba(15,23,42,1) 100%);
            border: 2px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            padding: 8% 10%; 
            box-sizing: border-box;
            overflow-y: auto; 
            overflow-x: hidden;
        }
        
        .center-face::-webkit-scrollbar {
            width: 4px;
        }
        .center-face::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .intro-active .center-front {
            justify-content: center;
            padding: 0; 
        }
        
        .intro-active .button-group,
        .intro-active .feedback,
        .intro-active .btn-hint-flip,
        .intro-active .target-prompt {
            display: none !important;
        }

        .center-back {
            transform: rotateY(180deg);
            background: radial-gradient(circle, rgba(20,30,50,0.95) 0%, rgba(10,15,25,1) 100%);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .action-required .center-front {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, rgba(15,23,42,1) 80%);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: inset 0 0 40px rgba(212, 175, 55, 0.15), 0 10px 30px rgba(0,0,0,0.6);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0% { box-shadow: inset 0 0 40px rgba(212, 175, 55, 0.15), 0 10px 30px rgba(0,0,0,0.6); }
            50% { box-shadow: inset 0 0 60px rgba(212, 175, 55, 0.35), 0 10px 40px rgba(0,0,0,0.7); }
            100% { box-shadow: inset 0 0 40px rgba(212, 175, 55, 0.15), 0 10px 30px rgba(0,0,0,0.6); }
        }

        .target-prompt {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
            transition: color 0.3s;
            max-width: 100%;
            word-wrap: break-word;
        }

        .target-book {
            font-family: 'Cinzel', serif;
            font-size: clamp(13px, 4vw, 24px); 
            font-weight: 700;
            margin: 0;
            color: #fff;
            line-height: 1.1;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            white-space: nowrap; 
            max-width: 100%;
            transition: font-size 0.3s, color 0.3s;
        }

        .target-book.intro-mode {
            font-size: clamp(26px, 7vw, 42px);
            color: var(--accent);
            text-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            white-space: normal;
            margin: auto 0; 
        }
        
        .pulse-anim { animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
            100% { transform: scale(1); opacity: 1; }
        }

        .feedback {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.3;
            margin-top: 6px;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease;
            max-width: 95%;
            color: #cbd5e1;
        }
        
        .feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            flex-direction: column; 
            gap: 6px;
            margin-top: 8px;
            pointer-events: auto;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            display: none;
            transition: transform 0.1s, background 0.2s;
        }
        
        .btn-action.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-action:active { transform: scale(0.95); }
        .btn-action.show { display: block; }

        .external-exit-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            display: none;
        }
        
        .external-exit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-hint-flip {
            position: absolute;
            bottom: 8%;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            pointer-events: auto;
            transition: color 0.2s;
            display: none;
        }
        .btn-hint-flip:hover { color: var(--accent); }
        .btn-hint-flip.show { display: block; }

        .hint-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
        .hint-value { font-size: 13px; color: #fff; margin-bottom: 2px; line-height: 1.2; }
        .hint-purpose { font-size: 12px; color: #cbd5e1; line-height: 1.3; margin-top: 2px; font-style: italic; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; box-sizing: border-box; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.3s ease; display: flex; flex-direction: column; gap: 15px; }
        .modal-overlay.active .modal-card { transform: scale(1); }
        .modal-title { font-family: 'Cinzel', serif; font-size: 22px; color: #fff; margin: 0; }
        .modal-body { font-size: 14px; color: #cbd5e1; line-height: 1.6; margin: 0; }
        .modal-save, .modal-cancel { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: none; color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.2s; }
        .modal-save:hover, .modal-cancel:hover { background: rgba(255, 255, 255, 0.2); }
        .radio-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .radio-label { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .radio-label:hover { background: rgba(0,0,0,0.4); border-color: var(--accent); }
        input[type="radio"] { accent-color: var(--accent); width: 18px; height: 18px; }
    </style>
</head>
<body>

    <header>
        <button class="settings-btn" id="btn-settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
        <h1>Navigate God's Word</h1>
        <div class="stats-container" id="stats-container">
            <div class="stats" id="game-stats">
                <div>Round: <span id="round-display">1</span>/10</div>
                <div>Score: <span id="score-display">0</span></div>
            </div>
            <!-- Redemption Badge Counter (FontAwesome Gift Icon) -->
            <div class="redemption-badge" id="redemption-badge" title="Saved items for redemption">
                <i class="fa-solid fa-gift"></i> <span id="redemption-count">0</span>
            </div>
        </div>
    </header>

    <div class="main-layout" id="main-layout">
        <div class="game-column">
            <div class="game-container">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
                
                <div class="center-ui" id="center-ui">
                    <div class="center-ui-inner" id="center-flipper">
                        <!-- Front Face -->
                        <div class="center-face center-front" id="center-front-pane">
                            <div class="target-prompt" id="prompt-text">Welcome</div>
                            <div class="target-book pulse-anim" id="target-book-display">Loading...</div>
                            <div class="feedback" id="feedback-display"></div>
                            
                            <div class="button-group">
                                <!-- Game buttons -->
                                <button class="btn-action" id="btn-next">Next Round</button>
                                <button class="btn-action" id="btn-restart">Play Again</button>
                                <button class="btn-action secondary" id="btn-study">Study Mode</button>
                                
                                <!-- Study specific scroll button -->
                                <button class="btn-action secondary" id="btn-study-next" style="margin-top: 5px;">View Books</button>
                            </div>
                            
                            <button class="btn-hint-flip" id="btn-hint-front" title="Flip for Hint"><i class="fa-solid fa-rotate-left"></i> Hint</button>
                        </div>
                        
                        <!-- Back Face (Hint) -->
                        <div class="center-face center-back">
                            <div class="hint-label">Author</div>
                            <div class="hint-value" id="hint-author"></div>
                            <div class="hint-label">Date</div>
                            <div class="hint-value" id="hint-date"></div>
                            <div class="hint-label">Purpose</div>
                            <div class="hint-purpose" id="hint-purpose"></div>
                            <button class="btn-hint-flip" id="btn-hint-back" style="display:block;" title="Return"><i class="fa-solid fa-rotate-left"></i> Return</button>
                        </div>
                    </div>
                </div>
            </div>

            <button class="external-exit-btn" id="btn-exit-study">Play Again</button>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-card">
            <div class="modal-title"><i class="fa-solid fa-gear"></i> Settings</div>
            <p class="modal-body">Choose your preferred Old Testament structure. Changing this will restart your current game.</p>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="ot_mode" value="traditional" checked>
                    <div>
                        <strong>Traditional (Christian)</strong>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">Law, History, Wisdom, Major Prophets, Minor Prophets.</div>
                    </div>
                </label>
                <label class="radio-label">
                    <input type="radio" name="ot_mode" value="tanakh">
                    <div>
                        <strong>Tanakh (Hebrew Bible)</strong>
                        <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">Torah, Nevi'im (Prophets), Ketuvim (Writings).</div>
                    </div>
                </label>
            </div>
            <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button class="modal-cancel" id="settings-cancel-btn">Cancel</button>
                <button class="modal-save" id="settings-save-btn" style="background:var(--accent); color:#000;">Apply & Restart</button>
            </div>
        </div>
    </div>

    <script>
        const bookHints = {
            "Genesis": { a: "Moses", d: "c. 1440 BC", p: "To record the creation and the origins of Israel's covenant." },
            "Exodus": { a: "Moses", d: "c. 1440 BC", p: "To record Israel's deliverance from Egypt and the giving of the Law." },
            "Leviticus": { a: "Moses", d: "c. 1440 BC", p: "To instruct priests and the people on holy worship and living." },
            "Numbers": { a: "Moses", d: "c. 1400 BC", p: "To detail the wilderness wanderings and God's discipline." },
            "Deuteronomy": { a: "Moses", d: "c. 1400 BC", p: "Moses' final sermons to renew the covenant with the next generation." },
            "Joshua": { a: "Joshua", d: "c. 1350 BC", p: "To record the conquest and division of the Promised Land." },
            "Judges": { a: "Samuel", d: "c. 1000 BC", p: "To record Israel's cycles of apostasy, judgment, and deliverance." },
            "Ruth": { a: "Unknown", d: "c. 1000 BC", p: "A story of redemption establishing the lineage of King David." },
            "1 Samuel": { a: "Unknown", d: "c. 900 BC", p: "To record the transition from judges to the monarchy of Saul and David." },
            "2 Samuel": { a: "Unknown", d: "c. 900 BC", p: "To detail the reign and covenant of King David." },
            "1 Kings": { a: "Jeremiah", d: "c. 550 BC", p: "To record Solomon's reign and the tragic division of the kingdom." },
            "2 Kings": { a: "Jeremiah", d: "c. 550 BC", p: "To record the decline, fall, and exile of both Israel and Judah." },
            "1 Chronicles": { a: "Ezra", d: "c. 450 BC", p: "To encourage returning exiles with David's spiritual history." },
            "2 Chronicles": { a: "Ezra", d: "c. 450 BC", p: "To detail the kings of Judah and the destruction of the temple." },
            "Ezra": { a: "Ezra", d: "c. 450 BC", p: "To record the return from exile and the rebuilding of the temple." },
            "Nehemiah": { a: "Nehemiah", d: "c. 430 BC", p: "To record the rebuilding of Jerusalem's walls and spiritual revival." },
            "Esther": { a: "Unknown", d: "c. 400 BC", p: "To show God's hidden providence in saving the Jews from genocide." },
            "Job": { a: "Unknown", d: "c. 2000 BC?", p: "To explore the problem of suffering and the absolute sovereignty of God." },
            "Psalms": { a: "David, Asaph, etc.", d: "1400–450 BC", p: "A collection of inspired songs for worship, praise, and lament." },
            "Proverbs": { a: "Solomon", d: "c. 900 BC", p: "To provide practical wisdom and instruction for holy, everyday living." },

            "Song of Solomon": { a: "Solomon", d: "c. 950 BC", p: "A poetic celebration of marital love and intimacy." },
            "Isaiah": { a: "Isaiah", d: "c. 700 BC", p: "To warn of judgment and promise salvation through the coming Messiah." },
            "Jeremiah": { a: "Jeremiah", d: "c. 600 BC", p: "The weeping prophet's final plea for Judah to repent before the exile." },
            "Lamentations": { a: "Jeremiah", d: "c. 586 BC", p: "To mourn the tragic destruction of Jerusalem and the temple." },
            "Ezekiel": { a: "Ezekiel", d: "c. 590 BC", p: "To pronounce judgment on Judah and promise a glorious future restoration." },
            "Daniel": { a: "Daniel", d: "c. 530 BC", p: "To show God's absolute sovereignty over all earthly nations." },
            "Hosea": { a: "Hosea", d: "c. 715 BC", p: "To illustrate God's faithful, pursuing love for an unfaithful people." },
            "Joel": { a: "Joel", d: "c. 835 BC", p: "To warn of the Day of the Lord and promise the outpouring of the Spirit." },
            "Amos": { a: "Amos", d: "c. 750 BC", p: "To denounce social injustice and demand true, heartfelt worship." },
            "Obadiah": { a: "Obadiah", d: "c. 586 BC", p: "To prophesy judgment against Edom for their cruelty to Judah." },
            "Jonah": { a: "Jonah", d: "c. 760 BC", p: "To show the boundless scope of God's grace, even to Gentile enemies." },
            "Micah": { a: "Micah", d: "c. 700 BC", p: "To warn of judgment and promise a Shepherd-King from Bethlehem." },
            "Nahum": { a: "Nahum", d: "c. 650 BC", p: "To pronounce the impending, righteous destruction of wicked Nineveh." },
            "Habakkuk": { a: "Habakkuk", d: "c. 605 BC", p: "A dialogue on trusting God's justice in a world filled with evil." },
            "Zephaniah": { a: "Zephaniah", d: "c. 625 BC", p: "To warn of global judgment and the purification of a faithful remnant." },
            "Haggai": { a: "Haggai", d: "c. 520 BC", p: "To exhort the returned exiles to prioritize rebuilding God's temple." },
            "Zechariah": { a: "Zechariah", d: "c. 520 BC", p: "To encourage the builders with apocalyptic visions of the coming Messiah." },
            "Malachi": { a: "Malachi", d: "c. 430 BC", p: "To call a backsliding Israel to repentance before the Lord returns." },
            "Matthew": { a: "Matthew", d: "c. 60 AD", p: "To prove to a Jewish audience that Jesus is the promised Messianic King." },
            "Mark": { a: "Mark", d: "c. 55 AD", p: "To present Jesus to Romans as the active, suffering Servant of God." },
            "Luke": { a: "Luke", d: "c. 60 AD", p: "To provide a highly accurate account of Jesus as the Savior for all people." },
            "John": { a: "John", d: "c. 90 AD", p: "To prove Jesus is the divine Son of God, that believing, you may have life." },
            "Acts": { a: "Luke", d: "c. 62 AD", p: "To record the descent of the Spirit and the rapid spread of the early Church." },
            "Romans": { a: "Paul", d: "c. 57 AD", p: "To provide a systematic theological explanation of the Gospel of grace." },
            "1 Corinthians": { a: "Paul", d: "c. 55 AD", p: "To correct severe worldly behaviors and divisions in the Corinthian church." },
            "2 Corinthians": { a: "Paul", d: "c. 56 AD", p: "To defend Paul's apostolic authority and explain the nature of ministry." },
            "Galatians": { a: "Paul", d: "c. 49 AD", p: "To fiercely defend justification by faith alone, apart from the Law." },

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const outerRadius = 380;
        const innerRadius = 250; 

        function drawWheel(dynamicHighlights = null, spanIndices = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            booksData.forEach((book, index) => {
                const currentOuterRadius = (book === activeTouchBook) ? outerRadius + 20 : outerRadius;

                ctx.beginPath();
                ctx.arc(cx, cy, currentOuterRadius, book.startAngle - Math.PI/2, book.endAngle - Math.PI/2);
                ctx.arc(cx, cy, innerRadius, book.endAngle - Math.PI/2, book.startAngle - Math.PI/2, true);
                ctx.closePath();
                
                let isDimmed = false;
                let fillStyle = null;

                if (introStage === 1) {
                    fillStyle = book.testament === 'OT' ? "#475569" : "#0f172a";
                } else if (introStage === 2) {
                    fillStyle = book.testament === 'NT' ? "#475569" : "#0f172a";
                } else if (introStage === 3) {
                    const activeCat = currentCategories[introSectionIndex];
                    if (book.cat === activeCat) {
                        fillStyle = colors[book.cat]; 
                    } else {
                        fillStyle = "#1e293b"; 
                    }
                } else if (isStudyMode) {
                    if (studyActiveCategory) {
                        if (studyIndex >= 0) {
                            const activeBook = studyQueue[studyIndex];
                            if (book.name === activeBook.name) {
                                fillStyle = colors[book.cat]; 
                            } else if (book.cat === studyActiveCategory) {
                                fillStyle = hexToPastel(colors[book.cat], 0.25); 
                            } else {
                                isDimmed = true; 
                            }
                        } else {
                            if (book.cat !== studyActiveCategory) {
                                isDimmed = true;
                            }
                        }
                    }
                } else if (!waitingForNextRound && revealedCategories.length > 0 && !revealedCategories.includes(book.cat)) {
                    isDimmed = true;
                }

                if (fillStyle) {
                    ctx.fillStyle = fillStyle;
                    ctx.fill();
                } else if (isDimmed) {
                    ctx.fillStyle = "#1e293b"; 
                    ctx.fill();
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; 
                    ctx.fill();
                } else {
                    ctx.fillStyle = colors[book.cat];
                    ctx.fill();
                }
            });

            if (spanIndices && spanIndices.length === 2 && !isRedemptionRound) {
                const [startIdx, endIdx] = spanIndices;
                ctx.save();
                for (let i = startIdx; i <= endIdx; i++) {
                    const book = booksData[i];
                    ctx.beginPath();
                    ctx.arc(cx, cy, outerRadius, book.startAngle - Math.PI/2, book.endAngle - Math.PI/2);
                    ctx.arc(cx, cy, innerRadius, book.endAngle - Math.PI/2, book.startAngle - Math.PI/2, true);
                    ctx.closePath();
                    ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
                    ctx.fill();
                }
                ctx.restore();
            }

            booksData.forEach((book, index) => {
                const prevBook = index === 0 ? booksData[booksData.length - 1] : booksData[index - 1];
                const isCategoryDivider = book.cat !== prevBook.cat;
                const isTestamentDivider = book.testament !== prevBook.testament;
                
                ctx.beginPath();
                const drawAngle = book.startAngle - Math.PI/2;
                ctx.moveTo(cx + Math.cos(drawAngle) * innerRadius, cy + Math.sin(drawAngle) * innerRadius);
                ctx.lineTo(cx + Math.cos(drawAngle) * outerRadius, cy + Math.sin(drawAngle) * outerRadius);
                
                if (introStage === 1 || introStage === 2) {
                    if (isTestamentDivider) {
                        ctx.strokeStyle = "rgba(212, 175, 55, 0.8)"; 
                        ctx.lineWidth = 4; 
                        ctx.stroke();
                    }
                } else if (introStage === 3) {
                    if (isCategoryDivider) {
                        ctx.strokeStyle = "#080c14";
                        ctx.lineWidth = 2.5; 
                        ctx.stroke();
                    }
                } else if (isRedemptionRound) {
                    if (isCategoryDivider) {
                        ctx.strokeStyle = "#080c14";
                        ctx.lineWidth = 2.5; 
                        ctx.stroke();
                    }
                } else {
                    if (isCategoryDivider) {
                        ctx.strokeStyle = "#080c14";
                        ctx.lineWidth = 2.5; 
                    } else {
                        ctx.strokeStyle = "rgba(8, 12, 20, 0.4)"; 
                        ctx.lineWidth = 0.75; 
                    }
                    ctx.stroke();
                }
            });

            ctx.beginPath();
            ctx.arc(cx, cy, outerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "#080c14"; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, outerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 1; ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "#080c14"; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1; ctx.stroke();

            if (dynamicHighlights) {
                dynamicHighlights.forEach(h => {
                    if (h.type === 'book') {
                        drawBookHighlight(h.target, h.hitType, h.alphaOverride);
                    } else if (h.type === 'category') {
                        drawCategoryHighlight(h.target, h.hitType, h.alphaOverride);
                    }
                });
            }
        }

        function drawBookHighlight(book, hitType, alphaOverride = 1.0) {
            const popRadius = outerRadius + 12;
            ctx.beginPath();
            ctx.arc(cx, cy, popRadius, book.startAngle - Math.PI/2, book.endAngle - Math.PI/2);
            ctx.arc(cx, cy, innerRadius, book.endAngle - Math.PI/2, book.startAngle - Math.PI/2, true);
            ctx.closePath();
            
            if (hitType === 'perfect') { 
                ctx.fillStyle = `rgba(52, 211, 153, ${0.4 * alphaOverride})`; 
                ctx.strokeStyle = `rgba(52, 211, 153, ${alphaOverride})`; 
            }
            else if (hitType === 'close') { 
                ctx.fillStyle = `rgba(251, 191, 36, ${0.3 * alphaOverride})`; 
                ctx.strokeStyle = `rgba(251, 191, 36, ${alphaOverride})`; 
            }
            else if (hitType === 'miss') { 
                ctx.fillStyle = `rgba(244, 63, 94, ${0.3 * alphaOverride})`; 
                ctx.strokeStyle = `rgba(244, 63, 94, ${alphaOverride})`; 
            }
            else if (hitType === 'pulse-white') {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * alphaOverride})`;
                ctx.strokeStyle = `rgba(255, 255, 255, ${alphaOverride})`;
            }
            
            ctx.fill(); 
            ctx.lineWidth = 3; 
            ctx.stroke();
        }

        function drawCategoryHighlight(catName, hitType, alphaOverride = 1.0) {
            const catBooks = booksData.filter(b => b.cat === catName);
            if (catBooks.length === 0) return;
            const startAngle = catBooks[0].startAngle;
            const endAngle = catBooks[catBooks.length - 1].endAngle;

            const popRadius = outerRadius + 12;
            ctx.beginPath();
            ctx.arc(cx, cy, popRadius, startAngle - Math.PI/2, endAngle - Math.PI/2);
            ctx.arc(cx, cy, innerRadius, endAngle - Math.PI/2, startAngle - Math.PI/2, true);
            ctx.closePath();

            if (hitType === 'pulse-cat-white') {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.15 * alphaOverride})`;
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 * alphaOverride})`;
            } else if (hitType === 'perfect-cat') {
                ctx.fillStyle = `rgba(52, 211, 153, ${0.3 * alphaOverride})`;
                ctx.strokeStyle = `rgba(52, 211, 153, ${alphaOverride})`;
            } else if (hitType === 'miss-cat') {
                ctx.fillStyle = `rgba(244, 63, 94, ${0.3 * alphaOverride})`;
                ctx.strokeStyle = `rgba(244, 63, 94, ${alphaOverride})`;
            }

            ctx.fill();
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function showDiagnosticReport() {
            if (pulseAnimationId) cancelAnimationFrame(pulseAnimationId);
            targetDisplay.classList.remove('pulse-anim');
            btnHintFront.classList.remove('show');
            centerFlipper.classList.remove('flipped');
            redemptionBadge.classList.remove('show');
            
            promptText.innerText = "Final Score";
            promptText.style.color = "var(--text-muted)";
            targetDisplay.innerText = `${score}`;
            
            feedbackDisplay.innerHTML = "";
            feedbackDisplay.classList.remove('show');
            
            btnRestart.classList.add('show');
            btnStudy.classList.add('show'); 
        }

        function startRound() {
            if (pulseAnimationId) cancelAnimationFrame(pulseAnimationId);
            waitingForNextRound = false;
            revealedCategories = []; 
            centerFlipper.classList.remove('flipped');
            feedbackDisplay.classList.remove('show');
            btnNext.classList.remove('show');
            btnStudy.classList.remove('show');
            updateRedemptionBadge();
            
            if (round > maxRounds) {
                if (redemptionQueue.length > 0) {
                    isRedemptionRound = true;
                    const nextRedemption = redemptionQueue.shift();
                    updateRedemptionBadge();
                    currentTargetIndex = booksData.findIndex(b => b.name === nextRedemption.name);
                    
                    targetDisplay.innerText = nextRedemption.name;
                    roundDisplay.innerText = "Bonus";
                    promptText.innerHTML = `<i class="fa-solid fa-gift"></i> Redemption`;
                    promptText.style.color = "#fbbf24";
                    
                    feedbackDisplay.innerHTML = `Select the correct category for <b>+100 points</b>!`;
                    feedbackDisplay.classList.add('show');
                    
                    const hintData = bookHints[nextRedemption.name];
                    if (hintData) {
                        hintAuthor.innerText = hintData.a; hintDate.innerText = hintData.d; hintPurpose.innerText = hintData.p;
                    }
                    targetDisplay.classList.add('pulse-anim');
                    btnHintFront.classList.add('show'); 
                    drawWheel();
                    return;
                } else {
                    showDiagnosticReport();
                    return;
                }
            }

            promptText.innerText = "Locate Book";
            promptText.style.color = "var(--accent)";
            targetDisplay.classList.add('pulse-anim');
            btnHintFront.classList.add('show'); 
            
            let availableBooks = booksData.filter(b => !usedBooks.includes(b.name));
            if (availableBooks.length === 0) availableBooks = booksData; 
            
            const targetBook = availableBooks[Math.floor(Math.random() * availableBooks.length)];
            usedBooks.push(targetBook.name);
            currentTargetIndex = booksData.findIndex(b => b.name === targetBook.name);
            
            targetDisplay.innerText = targetBook.name;
            roundDisplay.innerText = round;
            
            const hintData = bookHints[targetBook.name];
            if (hintData) {
                hintAuthor.innerText = hintData.a; hintDate.innerText = hintData.d; hintPurpose.innerText = hintData.p;
            } else {
                hintAuthor.innerText = "N/A"; hintDate.innerText = "N/A"; hintPurpose.innerText = "N/A";
            }
            drawWheel();
        }

        function getAngularDistance(targetBook, clickAngle) {
            if (clickAngle >= targetBook.startAngle && clickAngle <= targetBook.endAngle) return 0;
            let distToStart = Math.abs(clickAngle - targetBook.startAngle);
            let distToEnd = Math.abs(clickAngle - targetBook.endAngle);
            if (distToStart > Math.PI) distToStart = 2 * Math.PI - distToStart;
            if (distToEnd > Math.PI) distToEnd = 2 * Math.PI - distToEnd;
            return Math.min(distToStart, distToEnd);
        }

        function animateScore(start, end) {
            let current = start;
            const increment = Math.ceil((end - start) / 15);
            const timer = setInterval(() => {
                current += increment;
                if (current >= end) { current = end; clearInterval(timer); }
                scoreDisplay.innerText = current;
            }, 30);
        }

        canvas.addEventListener('click', (e) => {
            if (introStage > 0) return; 

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX - cx;
            const y = (e.clientY - rect.top) * scaleY - cy;

            const clickRadius = Math.sqrt(x*x + y*y);
            if (clickRadius < innerRadius || clickRadius > outerRadius + 20) return;

            let angle = Math.atan2(y, x) + Math.PI/2;
            if (angle < 0) angle += 2 * Math.PI;

            const clickedBook = booksData.find(b => angle >= b.startAngle && angle <= b.endAngle);
            if (!clickedBook) return;

            processBookSelection(clickedBook, angle);
        });

        function processBookSelection(clickedBook, angle) {
            if (isStudyMode) {
                selectStudyCategory(clickedBook.cat);
                return;
            }

            if (waitingForNextRound) return;

            waitingForNextRound = true;
            targetDisplay.classList.remove('pulse-anim');
            btnHintFront.classList.remove('show');
            centerFlipper.classList.remove('flipped'); 

            if (isRedemptionRound) {
                const targetBook = booksData[currentTargetIndex];
                const isHit = (clickedBook.cat === targetBook.cat);
                
                let points = 0;
                if (isHit) {
                    points = 100;
                    promptText.innerText = "Redeemed!"; promptText.style.color = "#34d399";
                    feedbackDisplay.innerHTML = `Correct! <b>${targetBook.name}</b> belongs in the <b>${targetBook.cat}</b>. (+100 pts)`;
                    showFloatingScore(points);
                } else {
                    promptText.innerText = "Missed!"; promptText.style.color = "#f43f5e";
                    feedbackDisplay.innerHTML = `You tapped <b>${clickedBook.cat}</b>.<br><b>${targetBook.name}</b> belongs in the <b>${targetBook.cat}</b>.`;
                }

                const oldScore = score;
                score += points;
                if (points > 0) animateScore(oldScore, score);

                feedbackDisplay.classList.add('show');
                btnNext.classList.add('show');

                if (isHit) {
                    drawWheel([{ type: 'category', target: targetBook.cat, hitType: 'perfect-cat', alphaOverride: 1.0 }]);
                } else {
                    if (pulseAnimationId) cancelAnimationFrame(pulseAnimationId);
                    let startTime = performance.now();
                    function runPulseCat(currentTime) {
                        if (!waitingForNextRound) return;
                        let elapsed = (currentTime - startTime) / 1000;
                        let alpha = (Math.sin(elapsed * Math.PI * 3) + 1) / 2 * 0.7 + 0.3;
                        drawWheel([
                            { type: 'category', target: clickedBook.cat, hitType: 'miss-cat', alphaOverride: 1.0 },
                            { type: 'category', target: targetBook.cat, hitType: 'pulse-cat-white', alphaOverride: alpha }
                        ]);
                        pulseAnimationId = requestAnimationFrame(runPulseCat);
                    }
                    pulseAnimationId = requestAnimationFrame(runPulseCat);
                }
                return;
            }

            const targetBook = booksData[currentTargetIndex];
            const radDist = getAngularDistance(targetBook, angle);
            const isMacroMiss = (clickedBook.cat !== targetBook.cat);
            
            revealedCategories = [targetBook.cat];
            if (clickedBook && isMacroMiss) revealedCategories.push(clickedBook.cat); 
            categoryStats[targetBook.cat].total += 1;

            let points = 0; let hitType = 'miss';

            if (radDist === 0) {
                points = 1000; hitType = 'perfect'; categoryStats[targetBook.cat].hits += 1;
                promptText.innerText = "Perfect Hit!"; promptText.style.color = "#34d399";
                feedbackDisplay.innerHTML = `Correct! You found <b>${targetBook.name}</b>.`; 
                showFloatingScore(points);
            } else if (!isMacroMiss) {
                points = Math.max(0, Math.floor(1000 - (radDist * 1200)));
                if(points > 0) {
                    hitType = 'close';
                    if (points > 500) categoryStats[targetBook.cat].hits += 1; 
                    promptText.innerText = "Close!"; promptText.style.color = "#fbbf24";
                    feedbackDisplay.innerHTML = `You tapped <b>${clickedBook.name}</b>.<br>Goal was <b>${targetBook.name}</b>.`; 
                    showFloatingScore(points);
                } else {
                    promptText.innerText = "Miss!"; promptText.style.color = "#f43f5e";
                    feedbackDisplay.innerHTML = `You tapped <b>${clickedBook.name}</b>.<br>Goal was <b>${targetBook.name}</b>.`; 
                }
            } else {
                redemptionQueue.push(targetBook);
                updateRedemptionBadge();
                points = 0; 
                promptText.innerText = "Miss!"; promptText.style.color = "#f43f5e";
                feedbackDisplay.innerHTML = `You tapped <b>${clickedBook.name}</b>.<br><b>${targetBook.name}</b> is in the <b>${targetBook.cat}</b>.`; 
            }

            const oldScore = score;
            score += points;
            if (points > 0) animateScore(oldScore, score);
            
            feedbackDisplay.classList.add('show');
            btnNext.classList.add('show');

            if (radDist === 0) {
                drawWheel([{ type: 'book', target: targetBook, hitType: 'perfect', alphaOverride: 1.0 }]);
            } else if (!isMacroMiss) {
                const cIdx = booksData.findIndex(b => b.name === clickedBook.name);
                const tIdx = currentTargetIndex;
                const spanIndices = [Math.min(cIdx, tIdx), Math.max(cIdx, tIdx)];
                
                if (pulseAnimationId) cancelAnimationFrame(pulseAnimationId);
                let startTime = performance.now();
                function runPulseMicro(currentTime) {
                    if (!waitingForNextRound) return;
                    let elapsed = (currentTime - startTime) / 1000;
                    let alpha = (Math.sin(elapsed * Math.PI * 3) + 1) / 2 * 0.7 + 0.3;
                    drawWheel([
                        { type: 'book', target: clickedBook, hitType: 'miss', alphaOverride: 1.0 },
                        { type: 'book', target: targetBook, hitType: 'pulse-white', alphaOverride: alpha }
                    ], spanIndices);
                    pulseAnimationId = requestAnimationFrame(runPulseMicro);
                }
                pulseAnimationId = requestAnimationFrame(runPulseMicro);
            } else {
                if (pulseAnimationId) cancelAnimationFrame(pulseAnimationId);
                let startTime = performance.now();
                function runPulseMacro(currentTime) {
                    if (!waitingForNextRound) return;
                    let elapsed = (currentTime - startTime) / 1000;
                    let alpha = (Math.sin(elapsed * Math.PI * 3) + 1) / 2 * 0.7 + 0.3;
                    drawWheel([
                        { type: 'book', target: clickedBook, hitType: 'miss', alphaOverride: 1.0 },
                        { type: 'category', target: targetBook.cat, hitType: 'pulse-cat-white', alphaOverride: alpha }
                    ]);
                    pulseAnimationId = requestAnimationFrame(runPulseMacro);
                }
                pulseAnimationId = requestAnimationFrame(runPulseMacro);
            }
        }

        btnNext.addEventListener('click', () => { 
            if (!isRedemptionRound) round++; 
            startRound(); 
        });

        // --- MOBILE TOUCH CONTROLS ---

        function getTouchData(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            if (!touch) return null;
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (touch.clientX - rect.left) * scaleX - cx;
            const y = (touch.clientY - rect.top) * scaleY - cy;

            const touchRadius = Math.sqrt(x*x + y*y);
            if (touchRadius < innerRadius || touchRadius > outerRadius + 20) return null;

            let angle = Math.atan2(y, x) + Math.PI/2;
            if (angle < 0) angle += 2 * Math.PI;

            const book = booksData.find(b => angle >= b.startAngle && angle <= b.endAngle);
            return { book, angle };
        }

        function handleTouchMove(e) {
            if (introStage > 0 || waitingForNextRound) return;
            
            // Prevent the whole web page from scrolling while dragging the wheel
            e.preventDefault(); 
            
            const touchData = getTouchData(e);
            const hoveredBook = touchData ? touchData.book : null;
            
            if (touchData) lastTouchAngle = touchData.angle;

            // Only redraw if the finger moves to a different book
            if (activeTouchBook !== hoveredBook) {
                activeTouchBook = hoveredBook;
                drawWheel();
            }
        }

        // Track the initial touch and any movement
        canvas.addEventListener('touchstart', handleTouchMove, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });

        // Trigger the game logic when the finger is lifted
        canvas.addEventListener('touchend', (e) => {
            if (introStage > 0 || waitingForNextRound) return;
            e.preventDefault();
            
            if (activeTouchBook && lastTouchAngle !== null) {
                const selectedBook = activeTouchBook;
                const selectedAngle = lastTouchAngle;
                
                // Reset states and visually drop the book back down
                activeTouchBook = null;
                lastTouchAngle = null;
                drawWheel();
                
                // Run the game scoring logic
                processBookSelection(selectedBook, selectedAngle);
            }
        });

        // --- DESKTOP HOVER CONTROLS ---
        
        canvas.addEventListener('mousemove', (e) => {
            if (introStage > 0 || waitingForNextRound) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX - cx;
            const y = (e.clientY - rect.top) * scaleY - cy;

            const hoverRadius = Math.sqrt(x*x + y*y);
            let hoveredBook = null;

            // Check if mouse is within the wheel boundaries
            if (hoverRadius >= innerRadius && hoverRadius <= outerRadius + 20) {
                let angle = Math.atan2(y, x) + Math.PI/2;
                if (angle < 0) angle += 2 * Math.PI;
                hoveredBook = booksData.find(b => angle >= b.startAngle && angle <= b.endAngle);
            }

            // Re-using the activeTouchBook variable to tell drawWheel() to expand it
            if (activeTouchBook !== hoveredBook) {
                activeTouchBook = hoveredBook;
                // Change cursor to pointer when hovering over a valid book
                canvas.style.cursor = hoveredBook ? 'pointer' : 'crosshair';
                drawWheel();
            }
        });

        // Drop the book back down if the mouse leaves the canvas entirely
        canvas.addEventListener('mouseleave', () => {
            if (activeTouchBook !== null) {
                activeTouchBook = null;
                canvas.style.cursor = 'crosshair';
                drawWheel();
            }
        });

        initGame();
    </script>
</body>
